<!-- Header -->


<header class="header">


<h1>

거래처 관리

</h1>



<button class="mobile-menu-btn">

☰

</button>


</header>








<!-- Main -->


<main class="main-content">



<section>



<div class="page-header">


<div>


<h2 class="page-title">

거래처 등록

</h2>


<p>

공급처와 고객 정보를 관리합니다.

</p>


</div>


</div>







<!-- PARTNER FORM -->


<div class="form-container">


<form id="partnerForm">



<div class="form-grid">





<div class="form-group">


<label>

거래처명

</label>


<input

type="text"

name="name"

required>


</div>






<div class="form-group">


<label>

구분

</label>


<select name="type">


<option value="supplier">

공급처

</option>


<option value="customer">

고객

</option>


</select>


</div>







<div class="form-group">


<label>

사업자 번호

</label>


<input

type="text"

name="business_number">


</div>






<div class="form-group">


<label>

전화번호

</label>


<input

type="text"

name="phone">


</div>






<div class="form-group">


<label>

이메일

</label>


<input

type="email"

name="email">


</div>






<div class="form-group">


<label>

주소

</label>


<input

type="text"

name="address">


</div>




</div>







<div class="form-actions">


<button

type="submit"

class="btn">


거래처 등록


</button>


</div>



</form>


</div>









<!-- PARTNER TABLE -->


<div class="table-container">



<div class="table-header">


<h2 class="table-title">

거래처 목록

</h2>


</div>






<div class="table-wrapper">


<table

class="data-table"

id="partnerTable">



<thead>


<tr>


<th>거래처명</th>

<th>구분</th>

<th>사업자번호</th>

<th>전화번호</th>

<th>이메일</th>

<th>주소</th>

<th>관리</th>


</tr>


</thead>




<tbody>


</tbody>




</table>


</div>



</div>




</section>



</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
