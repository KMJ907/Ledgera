<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>상품 관리</title>


<!-- CSS -->

<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/form.css">
<link rel="stylesheet" href="../css/table.css">
<link rel="stylesheet" href="../css/responsive.css">


</head>


<body>


<div class="sidebar-overlay"></div>



<!-- Sidebar -->

<aside class="sidebar">


<div class="sidebar-logo">

    매입매출 관리

</div>



<nav class="sidebar-menu">


<a href="../index.html">

    대시보드

</a>



<a href="purchase.html">

    매입관리

</a>



<a href="sales.html">

    매출관리

</a>



<a href="products.html" class="active">

    상품관리

</a>



<a href="partners.html">

    거래처관리

</a>



<a href="inventory.html">

    재고관리

</a>



<a href="settings.html">

    설정

</a>


</nav>


</aside>





<!-- Header -->

<header class="header">


<h1>

상품 관리

</h1>


<button class="mobile-menu-btn">

☰

</button>


</header>







<!-- Main -->

<main class="main-content">



<section>



<div class="page-header">


<div>

<h2 class="page-title">

상품 등록

</h2>


<p>

관리할 상품 정보를 등록합니다.

</p>


</div>


</div>







<!-- PRODUCT FORM -->

<div class="form-container">


<form id="productForm">



<div class="form-grid">



<div class="form-group">


<label>

상품명

</label>


<input

type="text"

name="name"

required>


</div>






<div class="form-group">


<label>

카테고리

</label>


<input

type="text"

name="category">


</div>






<div class="form-group">


<label>

단위

</label>


<input

type="text"

name="unit"

placeholder="개, kg 등">


</div>






<div class="form-group">


<label>

매입 가격

</label>


<input

type="number"

name="purchase_price"

required>


</div>






<div class="form-group">


<label>

판매 가격

</label>


<input

type="number"

name="sales_price"

required>


</div>






<div class="form-group">


<label>

현재 재고

</label>


<input

type="number"

name="stock"

value="0">


</div>



</div>







<div class="form-actions">


<button

type="submit"

class="btn">


상품 등록


</button>


</div>



</form>


</div>









<!-- PRODUCT TABLE -->


<div class="table-container">


<div class="table-header">


<h2 class="table-title">

상품 목록

</h2>


</div>





<div class="table-wrapper">


<table

class="data-table"

id="productTable">



<thead>


<tr>


<th>상품명</th>

<th>카테고리</th>

<th>단위</th>

<th>매입가</th>

<th>판매가</th>

<th>재고</th>

<th>관리</th>


</tr>


</thead>



<tbody>


</tbody>



</table>


</div>


</div>




</section>



</main>







<!-- JS -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>

<script src="../js/app.js"></script>

<script src="../js/products.js"></script>



</body>

</html>
